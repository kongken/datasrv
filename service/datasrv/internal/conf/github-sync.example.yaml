# Minimal runtime configuration examples for github issue sync.

# Option A: PostgreSQL + GORM
storage:
  driver: postgres
  postgres_dsn: "host=127.0.0.1 user=postgres password=postgres dbname=datasrv port=5432 sslmode=disable"

github:
  token: "${GITHUB_TOKEN}"
  base_url: ""

github_sync:
  enabled: true
  repos:
    - "owner-a/repo-a"
    - "owner-b/repo-b"
  interval_seconds: 300
  page_size: 100
  max_pages_per_run: 10
  request_timeout_seconds: 60

issue_summary:
  enabled: true
  interval_seconds: 600
  batch_size: 20
  max_issues_per_run: 50
  request_timeout_seconds: 60
  state: "all"
  overwrite_existing: false
  provider: "openai"
  model: "gpt-4.1-mini"
  system_prompt: ""
  openai_api_key: "${OPENAI_API_KEY}"
  openai_base_url: "https://your-openai-compatible-endpoint.example/v1"

---
# Option B: MongoDB
storage:
  driver: mongo
  mongo_uri: "mongodb://127.0.0.1:27017"
  mongo_db: "datasrv"

github:
  token: "${GITHUB_TOKEN}"
  base_url: ""

github_sync:
  enabled: true
  repos:
    - "owner-a/repo-a"
