# Minimal runtime configuration examples for github issue sync.

# Option A: PostgreSQL + GORM
storage:
  driver: postgres
  postgres_dsn: "host=127.0.0.1 user=postgres password=postgres dbname=datasrv port=5432 sslmode=disable"

github:
  token: "${GITHUB_TOKEN}"
  base_url: ""

github_sync:
  enabled: true
  repos:
    - "owner-a/repo-a"
    - "owner-b/repo-b"
  interval_seconds: 300
  page_size: 100
  max_pages_per_run: 10
  request_timeout_seconds: 15

---
# Option B: MongoDB
storage:
  driver: mongo
  mongo_uri: "mongodb://127.0.0.1:27017"
  mongo_db: "datasrv"

github:
  token: "${GITHUB_TOKEN}"
  base_url: ""

github_sync:
  enabled: true
  repos:
    - "owner-a/repo-a"
  interval_seconds: 300
  page_size: 100
  max_pages_per_run: 10
  request_timeout_seconds: 15
