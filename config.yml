# Demo configuration for datasrv.
# Run with:
#   BUTTERFLY_CONFIG_TYPE=file
#   BUTTERFLY_CONFIG_FILE_PATH=./config.yml

storage:
  driver: postgres
  postgres_dsn: "host=127.0.0.1 user=postgres password=postgres dbname=datasrv port=5432 sslmode=disable"

github:
  token: "${GITHUB_TOKEN}"
  base_url: ""

github_sync:
  enabled: true
  repos:
    - "owner-a/repo-a"
    - "owner-b/repo-b"
  interval_seconds: 300
  page_size: 100
  max_pages_per_run: 10
  request_timeout_seconds: 15

issue_comment_storage:
  enabled: false
  provider: "s3"
  bucket: "datasrv-issue-comments"
  region: "us-east-1"
  endpoint: ""
  access_key_id: ""
  secret_access_key: ""
  use_path_style: false
  key_prefix: "datasrv"

feed_sync:
  enabled: true
  interval_seconds: 300
  request_timeout_seconds: 15
  sources:
    - id: "example-feed"
      url: "https://example.com/feed.xml"
      display_name: "Example Feed"
      description: "Primary RSS source"
      site_url: "https://example.com"
      enabled: true

server:
  host: "0.0.0.0"
  port: 8080
