syntax = "proto3";

package issues.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/kongken/datasrv/pkg/proto/issues/v1;issuesv1";

// Issue 表示一个 GitHub issue
message Issue {
  // issue 的唯一标识符
  int64 id = 1;

  // issue 编号
  int32 number = 2;

  // issue 标题
  string title = 3;

  // issue 描述内容
  string body = 4;

  // issue 状态 (open, closed)
  string state = 5;

  // issue 创建者
  User user = 6;

  // 标签列表
  repeated Label labels = 7;

  // 受理人列表
  repeated User assignees = 8;

  // 评论数量
  int32 comments = 9;

  // 创建时间
  google.protobuf.Timestamp created_at = 10;

  // 更新时间
  google.protobuf.Timestamp updated_at = 11;

  // 关闭时间
  google.protobuf.Timestamp closed_at = 12;

  // issue 的 HTML URL
  string html_url = 13;

  // 里程碑
  Milestone milestone = 14;

  // 是否被锁定
  bool locked = 15;

  // AI 生成或外部写入的摘要
  string ai_summary = 16;

  // Full comments loaded from object storage on detail reads.
  repeated IssueComment comments_detail = 17;

  // Source repository in owner/repo format.
  string repo = 18;
}

// User 表示 GitHub 用户
message User {
  // 用户 ID
  int64 id = 1;

  // 用户名
  string login = 2;

  // 头像 URL
  string avatar_url = 3;

  // 用户主页 URL
  string html_url = 4;
}

// Label 表示 issue 标签
message Label {
  // 标签 ID
  int64 id = 1;

  // 标签名称
  string name = 2;

  // 标签颜色
  string color = 3;

  // 标签描述
  string description = 4;
}

// Milestone 表示里程碑
message Milestone {
  // 里程碑 ID
  int64 id = 1;

  // 里程碑编号
  int32 number = 2;

  // 里程碑标题
  string title = 3;

  // 里程碑描述
  string description = 4;

  // 里程碑状态 (open, closed)
  string state = 5;

  // 截止日期
  google.protobuf.Timestamp due_on = 6;
}

// IssueComment 表示 issue 评论
message IssueComment {
  // 评论 ID
  int64 id = 1;

  // 评论内容
  string body = 2;

  // 评论者
  User user = 3;

  // 创建时间
  google.protobuf.Timestamp created_at = 4;

  // 更新时间
  google.protobuf.Timestamp updated_at = 5;

  // 评论的 HTML URL
  string html_url = 6;
}

message SyncIssuesRequest {
  // Optional: sync a single repository in owner/repo format.
  // Empty means sync all configured repositories.
  string repo = 1;
}

message SyncRepoResult {
  string repo = 1;
  int32 fetched = 2;
  int32 persisted = 3;
  string error = 4;
}

message SyncIssuesResponse {
  google.protobuf.Timestamp started_at = 1;
  google.protobuf.Timestamp finished_at = 2;
  repeated SyncRepoResult results = 3;
}

message GetSyncConfigResponse {
  bool enabled = 1;
  repeated string repos = 2;
  int32 interval_seconds = 3;
  int32 page_size = 4;
  int32 max_pages_per_run = 5;
  int32 request_timeout_seconds = 6;
  string storage_driver = 7;
  bool github_token_configured = 8;
}

message UpdateSyncConfigRequest {
  bool enabled = 1;
  repeated string repos = 2;
  int32 interval_seconds = 3;
  int32 page_size = 4;
  int32 max_pages_per_run = 5;
  int32 request_timeout_seconds = 6;
}

message ManagedSyncRepo {
  string repo = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message ListManagedSyncReposResponse {
  repeated ManagedSyncRepo repos = 1;
}

message ReplaceManagedSyncReposRequest {
  repeated string repos = 1;
}

message SyncCheckpoint {
  string repo = 1;
  google.protobuf.Timestamp last_synced_at = 2;
  google.protobuf.Timestamp last_issue_updated_at = 3;
  string last_run_status = 4;
  string last_error = 5;
}

message GetSyncStatusResponse {
  google.protobuf.Timestamp last_started_at = 1;
  google.protobuf.Timestamp last_finished_at = 2;
  bool running = 3;
  repeated SyncRepoResult last_results = 4;
  repeated SyncCheckpoint checkpoints = 5;
}

message ListIssuesRequest {
  // owner/repo
  string repo = 1;
  // open, closed, all
  string state = 2;
  // 1-based page index
  int32 page = 3;
  // default by server when <= 0
  int32 page_size = 4;
}

message ListIssuesResponse {
  repeated Issue issues = 1;
  int32 page = 2;
  int32 page_size = 3;
  bool has_next = 4;
}

message GetIssueRequest {
  string repo = 1;
  oneof selector {
    int64 issue_id = 2;
    int32 number = 3;
  }
}

message GetIssueResponse {
  Issue issue = 1;
}

message UpdateIssueAISummaryRequest {
  string repo = 1;
  oneof selector {
    int64 issue_id = 2;
    int32 number = 3;
  }
  string ai_summary = 4;
}

message AdminLoginRequest {
  string user = 1;
  string password = 2;
}

message AdminLoginResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message AdminLogoutRequest {
  string token = 1;
}

message AdminLogoutResponse {
  bool success = 1;
  string message = 2;
}

message AdminWhoAmIRequest {}

message AdminWhoAmIResponse {
  string user = 1;
  google.protobuf.Timestamp expires_at = 2;
}

service IssueSyncAdminService {
  rpc SyncIssues(SyncIssuesRequest) returns (SyncIssuesResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/issues:sync"
      body: "*"
    };
  }
  rpc GetSyncConfig(google.protobuf.Empty) returns (GetSyncConfigResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/issues/sync-config"
    };
  }
  rpc UpdateSyncConfig(UpdateSyncConfigRequest) returns (GetSyncConfigResponse) {
    option (google.api.http) = {
      patch: "/api/v1/admin/issues/sync-config"
      body: "*"
    };
  }
  rpc ListManagedSyncRepos(google.protobuf.Empty) returns (ListManagedSyncReposResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/issues/repos"
    };
  }
  rpc ReplaceManagedSyncRepos(ReplaceManagedSyncReposRequest) returns (ListManagedSyncReposResponse) {
    option (google.api.http) = {
      put: "/api/v1/admin/issues/repos"
      body: "*"
    };
  }
  rpc GetSyncStatus(google.protobuf.Empty) returns (GetSyncStatusResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/issues/sync-status"
    };
  }
  rpc UpdateIssueAISummary(UpdateIssueAISummaryRequest) returns (GetIssueResponse) {
    option (google.api.http) = {
      patch: "/api/v1/admin/issues/ai-summary"
      body: "*"
    };
  }
}

service IssueQueryService {
  rpc ListIssues(ListIssuesRequest) returns (ListIssuesResponse) {
    option (google.api.http) = {
      get: "/api/v1/issues"
    };
  }
  rpc GetIssue(GetIssueRequest) returns (GetIssueResponse) {
    option (google.api.http) = {
      get: "/api/v1/issue"
    };
  }
}

service AdminAuthService {
  rpc AdminLogin(AdminLoginRequest) returns (AdminLoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/auth:login"
      body: "*"
    };
  }
  rpc AdminLogout(AdminLogoutRequest) returns (AdminLogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/auth:logout"
      body: "*"
    };
  }
  rpc AdminWhoAmI(AdminWhoAmIRequest) returns (AdminWhoAmIResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/auth:me"
    };
  }
}
